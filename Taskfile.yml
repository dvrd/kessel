version: '3'

vars:
  BIN: bin/kessel
  SRC: src
  INSTALL_DIR: '{{.HOME}}/.local/bin'
  OXC_BENCH: bench/oxc_compare/target/release/oxc_microbench
  BENCH_FILES: bench/real_world
  BENCH_ITERS: 20

tasks:
  build:
    desc: Build kessel (optimized)
    cmds:
      - mkdir -p bin
      - odin build {{.SRC}} -out:{{.BIN}} -o:speed -no-bounds-check
      - rm -rf {{.BIN}}.dSYM
    sources:
      - src/*.odin

  build:lib:
    desc: Build kessel shared library (libkessel.dylib/.so) for the npm package
    cmds:
      - mkdir -p bin
      - odin build {{.SRC}} -build-mode:shared -out:bin/libkessel.dylib -o:speed -no-bounds-check -extra-linker-flags:"-undefined dynamic_lookup"
    sources:
      - src/*.odin

  build:debug:
    desc: Build kessel (debug, with bounds checks)
    cmds:
      - mkdir -p bin
      - odin build {{.SRC}} -out:bin/kessel-debug -debug
      # dSYM kept for debug — lldb needs it for line-level stack traces

  build:coverage:
    desc: Build the OXC-style coverage harness binary (bin/kessel_coverage)
    cmds:
      - mkdir -p bin
      - odin build tests/coverage/src -out:bin/kessel_coverage -o:minimal
      - rm -rf bin/kessel_coverage.dSYM
    sources:
      - tests/coverage/src/*.odin
      - src/*.odin

  # Releases are fully automated via .github/workflows/release.yml.
  # Push to main with a conventional commit subject (feat: / fix: / perf:
  # / refactor: / feat!: for breaking changes) and the workflow will:
  #   1. compute the next semver from commits since the last v* tag,
  #   2. build libkessel for all 5 release targets,
  #   3. publish @dvrdlibs/kessel-<target> sub-packages,
  #   4. pin optionalDependencies and publish @dvrdlibs/kessel.
  # There is no local release task on purpose — single source of truth.

  test:
    desc: "Primary gate — coverage snap gate (50K+ fixtures) + unit fixtures."
    silent: false
    cmds:
      - task: test:coverage
      - task: test:unit

  test:coverage:
    desc: "OXC-style conformance harness — 10 snap files (parser + semantic for test262/babel/typescript/estree/misc). The parser_test262.snap / semantic_test262.snap files are the canonical conformance proof."
    deps: [build]
    silent: true
    cmds:
      - odin test tests/coverage/src -no-bounds-check -o:speed -define:ODIN_TEST_TRACK_MEMORY=false

  test:coverage:update:
    desc: "Regenerate every snap baseline. Run after a deliberate parser change."
    deps: [build:coverage]
    silent: true
    cmds:
      - ./bin/kessel_coverage run misc --update
      - ./bin/kessel_coverage run estree --update
      - ./bin/kessel_coverage run babel --update
      - ./bin/kessel_coverage run typescript --update
      - ./bin/kessel_coverage run test262 --update
      - ./bin/kessel_coverage run misc --semantic --update
      - ./bin/kessel_coverage run estree --semantic --update
      - ./bin/kessel_coverage run babel --semantic --update
      - ./bin/kessel_coverage run test262 --semantic --update

  test:coverage:run:
    desc: "Run a single coverage suite via the standalone binary. Usage: task test:coverage:run -- <suite> [--semantic] [--update]. Suites: test262 / babel / typescript / estree / misc / all."
    deps: [build:coverage]
    silent: true
    cmds:
      - ./bin/kessel_coverage run {{.CLI_ARGS}}

  test:unit:
    desc: "Positive fixture golden-output tests (430 fixtures)."
    deps: [build]
    silent: true
    cmds:
      - tests/runners/run_tests.sh

  test:quick:
    desc: "Fast dev-loop gate — unit + regression + invariants + lexer tokens (~8s)."
    deps: [build]
    silent: true
    cmds:
      - task: test:unit
      - task: test:regression
      - node tests/verifiers/verify_lexer_tokens.js

  test:regression:
    desc: "Structural regression checks (11 path-based assertions vs reference)."
    deps: [build, bench:oxc:build]
    silent: true
    cmds:
      - node tests/verifiers/verify_regression.js

  test:codegen:
    desc: "Codegen round-trip — parse → codegen → re-parse → AST equality across fixtures. Currently has known emitter bugs; not yet in `task test`."
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_codegen.js

  test:sourcemap:
    desc: "Source-map v3 end-to-end — decode kessel-emitted map with source-map-js and assert positions resolve to the right source lines."
    deps: [build]
    silent: true
    cmds:
      - NODE_PATH=bench/node_modules node tests/verifiers/verify_sourcemap.js

  test:real:
    desc: "Parse all 467 real-world files, fail on any error or crash."
    deps: [build]
    silent: true
    cmds:
      - |
        set +e
        outdir=$(mktemp -d)
        trap 'rm -rf "$outdir"' EXIT
        find {{.BENCH_FILES}} -type f \( -name '*.js' -o -name '*.mjs' \) -print0 \
          | xargs -0 -P "$(sysctl -n hw.ncpu 2>/dev/null || nproc || echo 4)" -I{} bash -c '
              f="$1"; outdir="$2"; bin="$3"
              base=$(echo "$f" | tr / _)
              err="$outdir/$base.err"
              timeout 30 "$bin" parse "$f" >/dev/null 2>"$err"
              rc=$?
              if [ "$rc" -ne 0 ]; then
                echo "FAIL: $f: exit=$rc (crash or timeout)"
              else
                n=$(grep "Parse errors:" "$err" | awk "{print \$3}")
                if [ "${n:-0}" -gt 0 ]; then echo "FAIL: $f: $n errors"; fi
              fi
            ' _ {} "$outdir" ./{{.BIN}}
        fails=$(find "$outdir" -name '*.err' -exec grep -l "Parse errors: [1-9]" {} \; 2>/dev/null | wc -l | tr -d ' ')
        total=$(find {{.BENCH_FILES}} -type f \( -name '*.js' -o -name '*.mjs' \) | wc -l | tr -d ' ')
        echo "$total files parsed, $fails failures"
        [ "$fails" -eq 0 ] || exit 1

  test:estree:
    desc: "String-escape decoding parity vs reference parser on key real-world files."
    deps: [build, bench:oxc:build]
    silent: true
    cmds:
      - node tests/verifiers/verify_string_escapes.js bench/real_world/jquery.js
      - node tests/verifiers/verify_string_escapes.js bench/real_world/react.dev.js
      - node tests/verifiers/verify_string_escapes.js bench/real_world/lodash.js
      - node tests/verifiers/verify_string_escapes.js bench/real_world/babel.js

  test:fuzz:
    desc: "Differential fuzz vs reference (100 random programs, baseline-gated)."
    deps: [build, bench:oxc:build]
    silent: true
    cmds:
      - node tests/verifiers/fuzz_diff.js --count 100 --seed 20260421 --parser oxc --baseline

  test:fuzz:invalid:
    desc: "Invalid-input mutation fuzz (300 mutations, baseline-gated)."
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/fuzz_invalid.js --count 300 --seed 20260422 --baseline

  test:crashes-known:
    desc: "Asserts known-SIGTRAP fixtures still crash as expected."
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_crashes_known.js

  test:lexer-tokens:
    desc: "Lexer token-stream conformance — AST span structure vs reference."
    deps: [build]
    silent: false
    cmds:
      - node tests/verifiers/verify_lexer_tokens.js

  test:release:
    desc: "Zero-tolerance pre-release gate — coverage + unit + regression + real-world + estree + fuzz + bench."
    deps: [build, bench:oxc:build]
    silent: false
    cmds:
      - task: test:coverage
      - task: test:unit
      - task: test:regression
      - task: test:real
      - task: test:estree
      - node tests/verifiers/fuzz_diff.js --count 100 --seed 20260421 --parser oxc --strict
      - node tests/verifiers/fuzz_invalid.js --count 300 --seed 20260422 --strict
      - task: test:crashes-known
      - task: test:bench:regression
      - task: test:lexer-tokens

  bench:oxc:verify:
    desc: Verify the local OXC oracle checkout and npm parser version are pinned.
    silent: false
    cmds:
      - node tests/verifiers/verify_oxc_pin.js

  bench:oxc:build:
    desc: Build pinned OXC reference binary (Rust) used by diff-against-OXC verifiers.
    deps: [bench:oxc:verify]
    dir: bench/oxc_compare
    cmds:
      - cargo build --release -q
    status:
      - test -f ../../{{.OXC_BENCH}}
      - test -f ../../bench/oxc_compare/target/release/oxc_cli_equiv
      - test -f ../../bench/oxc_compare/target/release/oxc_codegen_microbench

  bench:codegen:compare:
    desc: "Codegen latency — kessel vs oxc-codegen on real-world files."
    deps: [build, bench:oxc:build]
    silent: false
    cmds:
      - bash scripts/bench_codegen_vs_oxc.sh {{.CLI_ARGS}}

  test:bench:regression:
    desc: "Performance regression gate — microbench 10 curated files."
    deps: [build]
    silent: false
    cmds:
      - node tests/verifiers/verify_bench_regression.js --iterations 30

  test:bench:regression:update:
    desc: "Re-capture bench baseline after intentional perf work."
    deps: [build]
    silent: false
    cmds:
      - node tests/verifiers/verify_bench_regression.js --iterations 30 --update

  test:conformance:report:
    desc: "Print a human-readable conformance summary from the snap files."
    silent: false
    cmds:
      - node tests/verifiers/report_conformance.js

  test:conformance:report:json:
    desc: "Print conformance summary as JSON."
    silent: true
    cmds:
      - node tests/verifiers/report_conformance.js --json

  install:
    desc: Build and install kessel to ~/.local/bin
    deps: [build]
    cmds:
      - mkdir -p {{.INSTALL_DIR}}
      - cp {{.BIN}} {{.INSTALL_DIR}}/kessel
      - echo "Installed to {{.INSTALL_DIR}}/kessel"

  uninstall:
    desc: Remove kessel from ~/.local/bin
    cmds:
      - rm -f {{.INSTALL_DIR}}/kessel
      - echo "Removed {{.INSTALL_DIR}}/kessel"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin
      - rm -rf tmp/ast
