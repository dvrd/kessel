version: '3'

vars:
  BIN: bin/kessel
  SRC: src
  INSTALL_DIR: '{{.HOME}}/.local/bin'
  OXC_BENCH: bench/oxc_compare/target/release/oxc_microbench
  BENCH_FILES: bench/real_world
  BENCH_ITERS: 20

tasks:

  # ============================================================
  # Build
  # ============================================================

  build:
    desc: Build kessel (optimized)
    cmds:
      - mkdir -p bin
      - odin build {{.SRC}} -out:{{.BIN}} -o:speed -no-bounds-check
      - rm -rf {{.BIN}}.dSYM
    sources:
      - src/*.odin

  build:debug:
    desc: Build kessel (debug, with bounds checks)
    cmds:
      - mkdir -p bin
      - odin build {{.SRC}} -out:bin/kessel-debug -debug
      # dSYM kept for debug — lldb needs it for line-level stack traces

  # ============================================================
  # Test
  # ============================================================

  test:
    desc: Run all tests — unit, regression, real-world, spec-compliance, invariants, fixtures, nodes, recovery, lexical, ambiguity, test262, test262:subset, multi-parser, fuzz:diff (baselined), fuzz:invalid (baselined), crashes-known. All gates are baseline-gated in the default chain; run `task test:negative:strict` before a release for zero-tolerance on negative fixtures.
    deps: [build]
    silent: true
    cmds:
      - task: test:unit
      # Baseline-gated: known-accepted-but-shouldn't negative fixtures are
      # tracked in tests/baselines/negative_baseline.json and must not grow.
      # The strict variant (task test:negative:strict) is available as an
      # opt-in pre-release gate.
      - task: test:negative
      - task: test:ambiguity
      - task: test:regression
      - task: test:real
      - task: test:estree
      - task: test:nodes
      - task: test:recovery
      - task: test:lexical
      - task: test:invariants
      - task: test:spec-compliance
      - task: test:spec-fixtures
      - task: test:test262
      - task: test:test262:subset
      - task: test:multi-parser
      - task: test:fuzz
      - task: test:fuzz:invalid
      - task: test:crashes-known

  test:unit:
    desc: Positive fixture golden-output tests
    deps: [build]
    silent: true
    cmds:
      - tests/runners/run_tests.sh

  test:negative:
    desc: Negative and early-error fixtures must be rejected by the parser
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_negative.js

  test:negative:update:
    desc: Re-capture negative_baseline.json after a deliberate fix
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_negative.js --update

  test:negative:strict:
    desc: Zero-tolerance negative-fixture gate
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_negative.js --strict

  test:ambiguity:
    desc: "JS / TS / JSX boundary gate. 10 ambiguity fixtures, classified as pass / known_fail / unexpected_fail vs tests/baselines/ambiguity_baseline.json. Each fixture is parsed in its per-fixture intent mode (ts/jsx/js) and checked against its golden AND deep-compared vs OXC."
    deps: [build, bench:oxc:build]
    silent: true
    cmds:
      - node tests/verifiers/verify_ambiguity.js

  test:ambiguity:update:
    desc: Re-capture tests/baselines/ambiguity_baseline.json after a deliberate fix
    deps: [build, bench:oxc:build]
    silent: true
    cmds:
      - node tests/verifiers/verify_ambiguity.js --update

  test:ambiguity:strict:
    desc: Zero-tolerance ambiguity gate — every fixture must pass both golden match and deep compare.
    deps: [build, bench:oxc:build]
    silent: true
    cmds:
      - node tests/verifiers/verify_ambiguity.js --strict

  test:regression:
    desc: Structural regression checks for session-fixed bugs vs OXC
    deps: [build, bench:oxc:build]
    silent: true
    cmds:
      - node tests/verifiers/verify_regression.js

  test:estree:
    desc: ESTree-drift gates — string escape decoding + deep integration walk vs OXC
    deps: [build, bench:oxc:build]
    silent: true
    cmds:
      # String-escape decoding (Bug E): compares every kessel-emitted
      # `StringLiteral.value` to OXC's across a representative set of real
      # files covering single-char escapes, \xHH, \uHHHH, \u{H...H},
      # line continuations, and identity fallback.
      - node tests/verifiers/verify_string_escapes.js bench/real_world/jquery.js
      - node tests/verifiers/verify_string_escapes.js bench/real_world/react.dev.js
      - node tests/verifiers/verify_string_escapes.js bench/real_world/lodash.js
      - node tests/verifiers/verify_string_escapes.js bench/real_world/babel.js
      # Deep integration walk over the raw binary buffer vs OXC's parseSync.
      # Covers: arrow block bodies, function bodies inside IIFEs, for-loop
      # init/left slots, try/catch blocks, template literals, destructuring,
      # and — post-fix — cooked escape strings encoded via STRING_ARENA_FLAG.
      # Baseline-gated (tests/baselines/integration_baseline.json) so that
      # the tracked real-world drift doesn't block the chain while it is
      # fixed. Use `task test:estree:strict` for zero-tolerance before a
      # release, or `task test:integration:update` after a deliberate fix.
      - node tests/verifiers/verify_integration.js bench/real_world/jquery.js --baseline
      - node tests/verifiers/verify_integration.js bench/real_world/react-dom.dev.js --baseline
      - node tests/verifiers/verify_integration.js bench/real_world/batch2/preact.js --baseline
      - node tests/verifiers/verify_integration.js bench/real_world/batch3/snabbdom.js --baseline
      # Deep JSON-level compare — covers ALL 57 emitted node types (not just the
      # 37 the raw-buffer integration verifier walks). Gates snabbdom.js, the
      # smallest real file we can round-trip cleanly against every reference.
      - node tests/verifiers/verify_json_deep.js bench/real_world/batch3/snabbdom.js --parser oxc
      # Class decorator binary-buffer gate (S26 W1). The raw_transfer walker
      # had to be extended to follow `c.decorators`, `elem.decorators`, and
      # the embedded `c.id.name` / `f.id.name` strings; verify_integration
      # doesn't currently walk class bodies, so this dedicated verifier
      # exercises the new wiring against the stacked-feature decorator
      # fixture. Red before the fix, green after.
      - node tests/verifiers/verify_class_decorators.js
      # Class TS-slot binary-buffer gate (S26 W2-alt). Sibling of the
      # decorator gate — walks `c.type_parameters`, `c.implements`,
      # `elem.type_annotation`, `f.return_type`, and the inner
      # Identifier.type_annotation through the new master rewrite_ts_type
      # walker. Red before the fix, green after; tested via the curated
      # 002_generic_class.js + 013_class_implements.js fixtures.
      - node tests/verifiers/verify_class_typescript.js
      # TS-statement / JSX binary-buffer gate (S26 W3). Walks every TS
      # statement variant (TSInterfaceDeclaration / TSTypeAliasDeclaration
      # / TSEnumDeclaration / TSModuleDeclaration) and the JSX expression
      # variants (JSXElement / JSXFragment / JSXText /
      # JSXExpressionContainer / JSXEmptyExpression / JSXSpreadChild) plus
      # ChainExpression. Before W3 these all hit `case:` defaults in
      # rewrite_statement / rewrite_expression and left their inner
      # pointers as bare arena addresses. Red before the fix, green after;
      # tested via 011_interface_extends.js + 012_const_enum.js +
      # 015_namespace_module.js + spec/jsx/005_nested_element.js.
      - node tests/verifiers/verify_ts_statements_jsx.js

  test:estree:strict:
    desc: Zero-tolerance ESTree drift gate — every real-world integration walk must match OXC byte-for-byte.
    deps: [build, bench:oxc:build]
    silent: true
    cmds:
      - node tests/verifiers/verify_string_escapes.js bench/real_world/jquery.js
      - node tests/verifiers/verify_string_escapes.js bench/real_world/react.dev.js
      - node tests/verifiers/verify_string_escapes.js bench/real_world/lodash.js
      - node tests/verifiers/verify_string_escapes.js bench/real_world/babel.js
      - node tests/verifiers/verify_integration.js bench/real_world/jquery.js
      - node tests/verifiers/verify_integration.js bench/real_world/react-dom.dev.js
      - node tests/verifiers/verify_integration.js bench/real_world/batch2/preact.js
      - node tests/verifiers/verify_integration.js bench/real_world/batch3/snabbdom.js
      - node tests/verifiers/verify_json_deep.js bench/real_world/batch3/snabbdom.js --parser oxc
      - node tests/verifiers/verify_class_decorators.js
      - node tests/verifiers/verify_class_typescript.js
      - node tests/verifiers/verify_ts_statements_jsx.js

  test:integration:update:
    desc: Re-capture tests/baselines/integration_baseline.json for every file the estree gate walks through verify_integration.
    deps: [build, bench:oxc:build]
    silent: true
    cmds:
      - node tests/verifiers/verify_integration.js bench/real_world/jquery.js --update
      - node tests/verifiers/verify_integration.js bench/real_world/react-dom.dev.js --update
      - node tests/verifiers/verify_integration.js bench/real_world/batch2/preact.js --update
      - node tests/verifiers/verify_integration.js bench/real_world/batch3/snabbdom.js --update

  test:test262:
    desc: ECMA-262 syntax subset (66 curated parse-smoke tests, exit-code only)
    deps: [build]
    silent: true
    cmds:
      - bash tests/runners/run_test262.sh bin/kessel

  test:test262:subset:
    desc: "Category-aware Test262 gate. Reads tests/test262_manifest.json, parses each fixture's front-matter to tell positive from negative tests, and reports pass rate per grammar category (lexical, expressions, statements, functions, modules, early_errors). Baselined at tests/baselines/test262_subset_baseline.json; per-file AND per-category regressions fail the gate."
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_test262_subset.js

  test:test262:subset:update:
    desc: Re-capture tests/baselines/test262_subset_baseline.json after a deliberate fix
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_test262_subset.js --update

  test:test262:subset:strict:
    desc: Zero-tolerance Test262 subset — any known_fail or unexpected_fail fixture fails.
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_test262_subset.js --strict

  test:test262:full:
    desc: "Full Test262 corpus parse gate (≤45 000 tests). Requires a test262 checkout at vendor/test262 (git clone https://github.com/tc39/test262.git vendor/test262) or KESSEL_TEST262_DIR=... Expect minutes to run; off the default chain."
    deps: [build]
    silent: true
    cmds:
      - bash tests/runners/run_test262_full.sh

  test:test262:full:json:
    desc: "Full Test262 corpus with JSON output (for baselining and drift tracking). Writes to tmp/test262_full_run.json."
    deps: [build]
    silent: true
    cmds:
      - mkdir -p tmp
      - KESSEL_T262_JSON=tmp/test262_full_run.json bash tests/runners/run_test262_full.sh

  test:test262:full:regression:
    desc: "Compare the latest Test262 full-corpus run against the baseline; fail on any regression (pass count drop, crash growth, per-dir regression). Requires a preceding `task test:test262:full:json` run."
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_test262_full_regression.js

  test:test262:full:update:
    desc: "Relock the Test262 full-corpus baseline after an intentional improvement."
    deps: [build]
    silent: true
    cmds:
      - mkdir -p tmp
      - KESSEL_T262_JSON=tmp/test262_full_run.json bash tests/runners/run_test262_full.sh
      - node tests/verifiers/verify_test262_full_regression.js --update

  test:multi-parser:
    desc: ESTree cross-parser compat — compare Kessel against Acorn and Babel
    deps: [build]
    silent: true
    cmds:
      # snabbdom.js is the gold-standard "every parser agrees" fixture today.
      # If this file ever disagrees across oxc/acorn/babel, something regressed
      # in either Kessel's ESTree output OR in the normalisation layer.
      - node tests/verifiers/verify_json_deep.js bench/real_world/batch3/snabbdom.js --parser acorn
      - node tests/verifiers/verify_json_deep.js bench/real_world/batch3/snabbdom.js --parser babel

  test:nodes:
    desc: ESTree node-type coverage — minimal fixture per emitted type
    deps: [build]
    silent: true
    cmds:
      # 57 fixtures, one per node type Kessel claims to emit. Each is parsed
      # and checked that the expected type name appears in the output. Guards
      # against silent breakage of any single emit path.
      - node tests/verifiers/estree_nodes_coverage.js

  test:invariants:
    desc: Structural ESTree invariants across the 467-file real-world corpus
    deps: [build]
    silent: true
    cmds:
      # 8 zero-tolerance invariants (start/end present, start<=end, Program
      # shape, function shapes, catch shapes, declarator shapes) + 2 baseline-
      # locked (no-Unknown, no-UNIMPLEMENTED). Any violation of the former, or
      # an increase above baseline on the latter, fails the gate.
      - node tests/verifiers/verify_invariants.js

  test:recovery:
    desc: "Error-recovery quality gate. Every fixture under tests/fixtures/recovery/* is intentionally malformed but carries a `const anchor_after_error = 1;` declaration after the malformed region. The verifier asserts: parser didn't crash, parse-error count is bounded, the anchor survived in the emitted AST, no Unknown-node explosions, no absurd source spans. Zero-tolerance."
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_recovery.js

  test:lexical:
    desc: "Tokenisation-sensitive AST-shape gate. 10 lexical fixtures (BOM/hashbang, CRLF restricted production, identifier escapes, numeric separators, template raw/cooked, comment-regex boundary, ZWJ, U+2028/U+2029) each checked via a focused per-fixture AST assertion, not just pass/fail. Baselined at tests/baselines/lexical_surfaces_baseline.json; two current tracked lexer gaps are visible there."
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_lexical_surfaces.js

  test:lexical:update:
    desc: Re-capture tests/baselines/lexical_surfaces_baseline.json after a deliberate fix
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_lexical_surfaces.js --update

  test:lexical:strict:
    desc: Zero-tolerance lexical-surfaces gate — every per-fixture AST assertion must pass.
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_lexical_surfaces.js --strict

  test:spec-compliance:
    desc: Deep JSON compare vs OXC/Acorn/Babel on curated real files, baseline-locked
    deps: [build]
    silent: true
    cmds:
      # Divergence counts per (file, parser) pair are locked in
      # tests/spec_baseline.json. Any increase is a regression; any
      # decrease is an improvement (run with --update to commit).
      - node tests/verifiers/verify_spec_compliance.js

  test:invariants:update:
    desc: Re-capture invariants_baseline.json after a deliberate fix
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_invariants.js --update

  test:spec-compliance:update:
    desc: Re-capture spec_baseline.json after a deliberate fix
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_spec_compliance.js --update

  test:spec-fixtures:
    desc: Hand-authored ES spec fixtures (es2015–es2025 + edge) vs OXC, category pass rates baseline-locked
    deps: [build]
    silent: true
    cmds:
      # 56 minimal fixtures, one per ES feature. Each is parsed by Kessel
      # and deep-JSON-compared to OXC; a fixture passes only on exact match.
      # Category pass rates in tests/spec_fixtures_baseline.json are locked;
      # a regression in any category fails. Easier to triage than real-world
      # regressions — failure category points directly at a feature bucket.
      - node tests/runners/run_spec_fixtures.js

  test:spec-fixtures:update:
    desc: Re-capture spec_fixtures_baseline.json after a deliberate fix
    deps: [build]
    silent: true
    cmds:
      - node tests/runners/run_spec_fixtures.js --update

  test:deep-families:
    desc: "Per-family deep-compare gate. Runs verify_json_deep vs OXC across the high-risk syntax families (ambiguity, asi, escapes, interactions, jsx, lexical, regex_disambiguation, typescript, unicode) and locks {files, pass, fail, divergences} per family at tests/baselines/deep_families_baseline.json. Complementary view to test:spec-fixtures (which reports by ES category); kept out of the default test chain because it re-runs the same deep compare."
    deps: [build, bench:oxc:build]
    silent: true
    cmds:
      - node tests/verifiers/verify_deep_families.js

  test:deep-families:update:
    desc: Re-capture tests/baselines/deep_families_baseline.json after a deliberate fix
    deps: [build, bench:oxc:build]
    silent: true
    cmds:
      - node tests/verifiers/verify_deep_families.js --update

  test:surface-status:
    desc: "Product-surface reporter. Reads tests/surface_status.json and prints per-surface coverage: fixture counts, baseline snapshots, strong/medium/weak labels, and a consolidated 'coverage gaps' section. Reporter, not a gate — exit 0 on valid config, 2 on config errors. Use --json, --verbose, or --surface <name> for variants."
    deps: [build]
    silent: false
    cmds:
      - node tests/verifiers/report_surface_status.js

  test:fuzz:
    desc: "Differential fuzz vs OXC — baseline-gated. Fixed seed; tests/baselines/fuzz_baseline.json locks the set of known-failing case hashes. A NEW failure hash fails the gate; a disappearing hash is reported as an IMPROVEMENT (run test:fuzz:update to commit)."
    deps: [build, bench:oxc:build]
    silent: true
    cmds:
      # 100 random cases, seed + count + parser pinned so the generated-
      # program hash-set is reproducible across runs. Baseline mode compares
      # the CURRENT failing-hash set to the committed set; new hashes fail,
      # vanished hashes print as IMPROVEMENTS.
      - node tests/verifiers/fuzz_diff.js --count 100 --seed 20260421 --parser oxc --baseline

  test:fuzz:update:
    desc: Re-capture tests/baselines/fuzz_baseline.json (use after fixing a fuzz-found bug)
    deps: [build, bench:oxc:build]
    silent: true
    cmds:
      - node tests/verifiers/fuzz_diff.js --count 100 --seed 20260421 --parser oxc --update

  test:fuzz:strict:
    desc: Zero-tolerance differential fuzz — any mismatch vs OXC fails, regardless of baseline. Use before a release.
    deps: [build, bench:oxc:build]
    silent: true
    cmds:
      - node tests/verifiers/fuzz_diff.js --count 100 --seed 20260421 --parser oxc --strict

  test:fuzz:invalid:
    desc: "Invalid-input mutation fuzzer. Mutates random bytes from the 467-file real-world corpus (bit-flips, truncations, broken UTF-8, nul-injection, nested garbage) and asserts Kessel exits {0,1} within a deadline — never SIGTRAP/SIGSEGV/SIGABRT. Baseline-gated against tests/baselines/fuzz_invalid_baseline.json."
    deps: [build]
    silent: true
    cmds:
      # 300 mutations, seed pinned so the crash-hash set is reproducible.
      # A signal-terminated or timed-out run is a crash; exit 0 (parsed)
      # and 1 (reported parse errors) are both OK.
      - node tests/verifiers/fuzz_invalid.js --count 300 --seed 20260422 --baseline

  test:fuzz:invalid:update:
    desc: Re-capture tests/baselines/fuzz_invalid_baseline.json (use ONLY after triaging every crash)
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/fuzz_invalid.js --count 300 --seed 20260422 --update

  test:fuzz:invalid:strict:
    desc: Zero-tolerance invalid-input fuzz — any crash fails, regardless of baseline. Use before a release.
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/fuzz_invalid.js --count 300 --seed 20260422 --strict

  test:crashes-known:
    desc: "Asserts the 3 known-SIGTRAP fixtures still crash exactly as expected. A stopped-crashing fixture is an IMPROVEMENT (surface it explicitly, don't hide it as 'unit test passes'). A new crashing fixture regresses the gate. Pinned in tests/verifiers/verify_crashes_known.js."
    deps: [build]
    silent: true
    cmds:
      - node tests/verifiers/verify_crashes_known.js

  test:real:
    desc: Parse all 467 real-world JS files in parallel, fail on any error
    deps: [build]
    silent: true
    cmds:
      - |
        # Parallel driver — kessel is single-file-per-invocation and CPU-bound.
        # xargs -P $(nproc) gives near-linear speedup on multi-core.
        # For each file: redirect stdout (potentially 100+ MB of JSON) to
        # /dev/null; capture stderr (where "Parse errors: N" appears) to a
        # per-file tempfile; grep for errors. Prints FAIL: lines only.
        set +e
        outdir=$(mktemp -d)
        trap 'rm -rf "$outdir"' EXIT
        find {{.BENCH_FILES}} -type f \( -name '*.js' -o -name '*.mjs' \) -print0 \
          | xargs -0 -P "$(sysctl -n hw.ncpu 2>/dev/null || nproc || echo 4)" -I{} bash -c '
              f="$1"; outdir="$2"; bin="$3"
              base=$(echo "$f" | tr / _)
              err="$outdir/$base.err"
              timeout 30 "$bin" parse "$f" >/dev/null 2>"$err"
              rc=$?
              if [ "$rc" -ne 0 ]; then
                echo "FAIL: $f: exit=$rc (crash or timeout)"
              else
                n=$(grep "Parse errors:" "$err" | awk "{print \$3}")
                if [ "${n:-0}" -gt 0 ]; then echo "FAIL: $f: $n errors"; fi
              fi
            ' _ {} "$outdir" ./{{.BIN}}
        fails=$(find "$outdir" -name '*.err' -exec grep -l "Parse errors: [1-9]" {} \; 2>/dev/null | wc -l | tr -d ' ')
        total=$(find {{.BENCH_FILES}} -type f \( -name '*.js' -o -name '*.mjs' \) | wc -l | tr -d ' ')
        echo "$total files parsed, $fails failures"
        [ "$fails" -eq 0 ] || exit 1

  # ============================================================
  # Benchmark
  # ============================================================

  bench:
    desc: Full benchmark vs OXC (all files)
    deps: [build, bench:oxc:build]
    cmds:
      - |
        faster=0; parity=0; slower=0; total=0
        for f in $(find {{.BENCH_FILES}} -name '*.js' -o -name '*.mjs' | sort); do
          k=$(./{{.BIN}} microbench parse "$f" --iterations {{.BENCH_ITERS}} 2>&1 | awk '/Min:/ {print $2}')
          o=$({{.OXC_BENCH}} "$f" {{.BENCH_ITERS}} 2>&1 | awk '/Min:/ {print $2}')
          [ -z "$k" ] || [ -z "$o" ] && continue
          total=$((total+1))
          r=$(python3 -c "v=float('$k')/float('$o'); print(f'{v:.3f}')" 2>/dev/null)
          [ -z "$r" ] && continue
          is_faster=$(python3 -c "print(1 if float('$r') <= 0.97 else 0)")
          is_parity=$(python3 -c "print(1 if 0.97 < float('$r') <= 1.03 else 0)")
          if [ "$is_faster" = "1" ]; then faster=$((faster+1))
          elif [ "$is_parity" = "1" ]; then parity=$((parity+1))
          else slower=$((slower+1)); fi
        done
        echo ""
        echo "========================================"
        echo "  $total files benchmarked"
        echo "========================================"
        echo "Faster (≤0.97x): $faster ($((faster*100/total))%)"
        echo "Parity (0.97–1.03x): $parity ($((parity*100/total))%)"
        echo "Slower (>1.03x): $slower ($((slower*100/total))%)"
        echo "At parity or faster: $((faster+parity)) ($(((faster+parity)*100/total))%)"

  bench:quick:
    desc: Benchmark 10 key files vs OXC (apples-to-apples — ast-only mode)
    deps: [build, bench:oxc:build]
    cmds:
      - |
        # OXC's parser-only bench harness defers all scope/binding/early-error
        # checks to oxc_semantic, which the bench never invokes. To compare on
        # equal terms, kessel runs in --ast-only mode (which disables the same
        # set of checks). Test262 / TS / JSX / negative gates all keep the
        # checks ON via the default parse path, so conformance is preserved.
        printf 'apples-to-apples (kessel --ast-only vs OXC parse-only)\n\n'
        for f in \
          bench/real_world/typescript.js \
          bench/real_world/batch2/cesium.js \
          bench/real_world/batch2/monaco.js \
          bench/real_world/antd.js \
          bench/real_world/jquery.js \
          bench/real_world/d3.js \
          bench/real_world/react-dom.dev.js \
          bench/real_world/batch2/preact.js \
          bench/real_world/lodash.js \
          bench/real_world/batch3/snabbdom.js; do
          name=$(basename "$f")
          k=$(./{{.BIN}} microbench parse "$f" --iterations 30 --ast-only 2>&1 | awk '/Min:/ {print $2}')
          o=$({{.OXC_BENCH}} "$f" 30 2>&1 | awk '/Min:/ {print $2}')
          r=$(python3 -c "print(f'{float(\"$k\")/float(\"$o\"):.2f}x')" 2>/dev/null)
          printf '%-25s kessel=%-12s oxc=%-12s ratio=%s\n' "$name" "${k}us" "${o}us" "$r"
        done

  bench:quick:full:
    desc: "Benchmark 10 key files vs OXC (apples-to-oranges \u2014 full kessel parse with all conformance checks ON)"
    deps: [build, bench:oxc:build]
    cmds:
      - |
        # Compares kessel's full parse (all spec-mandated scope / early-error
        # checks ON — i.e. parser+semantic combined) against OXC's parser-only.
        # This is apples-to-oranges and was the historical default; use
        # `bench:quick` for the fair comparison.
        printf 'apples-to-oranges (kessel full parse vs OXC parse-only)\n\n'
        for f in \
          bench/real_world/typescript.js \
          bench/real_world/batch2/cesium.js \
          bench/real_world/batch2/monaco.js \
          bench/real_world/antd.js \
          bench/real_world/jquery.js \
          bench/real_world/d3.js \
          bench/real_world/react-dom.dev.js \
          bench/real_world/batch2/preact.js \
          bench/real_world/lodash.js \
          bench/real_world/batch3/snabbdom.js; do
          name=$(basename "$f")
          k=$(./{{.BIN}} microbench parse "$f" --iterations 30 2>&1 | awk '/Min:/ {print $2}')
          o=$({{.OXC_BENCH}} "$f" 30 2>&1 | awk '/Min:/ {print $2}')
          r=$(python3 -c "print(f'{float(\"$k\")/float(\"$o\"):.2f}x')" 2>/dev/null)
          printf '%-25s kessel=%-12s oxc=%-12s ratio=%s\n' "$name" "${k}us" "${o}us" "$r"
        done

  bench:oxc:build:
    desc: Build OXC benchmark binary (Rust)
    dir: bench/oxc_compare
    cmds:
      - cargo build --release -q
    status:
      - test -f ../../{{.OXC_BENCH}}
    sources:
      - bench/oxc_compare/**/*.rs
      - bench/oxc_compare/Cargo.toml

  # ============================================================
  # Performance regression gate — separate from the default `task test`
  # chain because (a) it's slow (~60s), and (b) it's sensitive to machine
  # noise. Run before a release and after intentional perf work.
  # ============================================================

  test:bench:regression:
    desc: "Performance regression gate. Microbench 10 curated files, compare min runtime to tests/baselines/bench_baseline.json. Fails if any file is >10% slower OR geo-mean is >5% slower."
    deps: [build]
    silent: false
    cmds:
      # 30 iterations per file keeps the Min-of-N estimate tight without
      # dominating wall-clock. Warmup run per file is handled inside the
      # verifier. Re-run on a quiet machine if the geo-mean is borderline.
      - node tests/verifiers/verify_bench_regression.js --iterations 30

  test:bench:regression:update:
    desc: "Re-capture tests/baselines/bench_baseline.json. Use after intentional perf work; include the rationale in the commit message."
    deps: [build]
    silent: false
    cmds:
      - node tests/verifiers/verify_bench_regression.js --iterations 30 --update

  # ============================================================
  # TypeScript / JSX conformance gates
  #
  # Separate from `task test` because they validate parser surface
  # area that's still stabilising. Each gate compares against a
  # locked baseline at tests/baselines/{ts,jsx}_conformance_baseline.json
  # and fails on regressions (pass→fail or new failures). Use the
  # :update variants after deliberate parser changes.
  # ============================================================

  test:ts:conformance:
    desc: "TypeScript conformance gate. Parses the curated TS / .d.ts corpus and checks against tests/baselines/ts_conformance_baseline.json. Fails on regressions; baseline-locked failures are tolerated. Run :update after a deliberate parser fix."
    deps: [build]
    silent: false
    cmds:
      - node tests/verifiers/verify_ts_conformance.js

  test:ts:conformance:update:
    desc: "Re-capture tests/baselines/ts_conformance_baseline.json. Use after a deliberate TS parser fix; commit message should explain the gain."
    deps: [build]
    silent: false
    cmds:
      - node tests/verifiers/verify_ts_conformance.js --update

  test:ts:conformance:strict:
    desc: "Zero-tolerance TS conformance: any failure (regression OR baseline-known) fails the gate. Useful as a release gate."
    deps: [build]
    silent: false
    cmds:
      - node tests/verifiers/verify_ts_conformance.js --strict

  test:jsx:conformance:
    desc: "JSX conformance gate. Parses the curated JSX/TSX corpus and checks against tests/baselines/jsx_conformance_baseline.json. Same regression model as test:ts:conformance."
    deps: [build]
    silent: false
    cmds:
      - node tests/verifiers/verify_jsx_conformance.js

  test:jsx:conformance:update:
    desc: "Re-capture tests/baselines/jsx_conformance_baseline.json."
    deps: [build]
    silent: false
    cmds:
      - node tests/verifiers/verify_jsx_conformance.js --update

  test:jsx:conformance:strict:
    desc: "Zero-tolerance JSX conformance gate."
    deps: [build]
    silent: false
    cmds:
      - node tests/verifiers/verify_jsx_conformance.js --strict

  # ============================================================
  # Install
  # ============================================================

  install:
    desc: Build and install kessel to ~/.local/bin
    deps: [build]
    cmds:
      - mkdir -p {{.INSTALL_DIR}}
      - cp {{.BIN}} {{.INSTALL_DIR}}/kessel
      - echo "Installed to {{.INSTALL_DIR}}/kessel"

  uninstall:
    desc: Remove kessel from ~/.local/bin
    cmds:
      - rm -f {{.INSTALL_DIR}}/kessel
      - echo "Removed {{.INSTALL_DIR}}/kessel"

  # ============================================================
  # Clean
  # ============================================================

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin
      - rm -rf tmp/ast
