name: Release

on:
  push:
    branches: [main]
    # Skip releases triggered by commits that only touch paths which can't
    # change the published artifacts. A commit that touches *any* file
    # outside this list still fires the workflow normally, so mixed
    # commits (e.g. parser fix + test fixture) keep releasing.
    #
    # Not ignored on purpose:
    #   - src/**, npm/**, Taskfile.yml      — affect the shipped binary or JS
    #   - .github/workflows/release.yml     — changes here should be tested
    #                                         via a real release
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'tests/**'
      - 'bench/**'
      - 'scripts/xcheck.sh'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deprecate.yml'
      - '.gitignore'
  # Manual escape hatch — force a release for docs-only commits, or rerun
  # a release that was skipped by paths-ignore.
  workflow_dispatch:

# Only one release at a time. New pushes wait for the current release to finish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # check — skip releases triggered by the release commit itself (loop guard).
  # ---------------------------------------------------------------------------
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          MSG=$(git log -1 --format=%s)
          if [[ "$MSG" == release:* ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: HEAD is a release commit"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # version — compute the next version once, share with every downstream job.
  #
  # Sources, in order:
  #   1. Currently-published version of @dvrdlibs/kessel on the npm registry.
  #      (Authoritative — what users see.)
  #   2. Sentinel 0.1.0 if the package has never been published.
  #
  # Bump rule, from conventional commits since the last v* git tag:
  #   feat!: / refactor!: / "BREAKING CHANGE"   → major
  #   feat: / refactor:                         → minor
  #   anything else                             → patch
  # ---------------------------------------------------------------------------
  version:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      bump: ${{ steps.compute.outputs.bump }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for conventional-commit scanning

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - id: compute
        run: |
          set -euo pipefail

          # 1. Current published version (or sentinel 0.1.0 if 404).
          CURRENT=$(npm view @dvrdlibs/kessel version 2>/dev/null || echo "")
          if [[ -z "$CURRENT" ]]; then
            CURRENT="0.1.0"
            echo "Package not yet on registry; starting from sentinel $CURRENT"
          else
            echo "Current published version: $CURRENT"
          fi

          # 2. Commits since the last v* tag (or whole history if none).
          LAST_TAG=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$LAST_TAG" ]]; then
            RANGE="HEAD"
            echo "No v* tag found; scanning entire history"
          else
            RANGE="$LAST_TAG..HEAD"
            echo "Scanning commits since $LAST_TAG"
          fi
          COMMITS=$(git log --format="%s" $RANGE)

          # Use here-strings (<<<) rather than pipes: `echo | grep -q` would
          # SIGPIPE on early `-q` exit, which set -o pipefail propagates as a
          # failure (exit 141), making every branch fall through to patch.
          if grep -qE "^(feat|refactor)(\(.+\))?!:|BREAKING CHANGE" <<< "$COMMITS"; then
            BUMP="major"
          elif grep -qE "^(feat|refactor)(\(.+\))?:" <<< "$COMMITS"; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          # 3. Apply the bump.
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW="$MAJOR.$MINOR.$PATCH"

          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "=== Bump $CURRENT → $NEW ($BUMP) ==="

  # ---------------------------------------------------------------------------
  # build — produce libkessel.{dylib,so,dll} for every target. One artifact
  # per platform, consumed by publish-platforms below.
  #
  # fail-fast: true — if any platform's build fails, we abort the whole
  # release. A partial set of binaries is worse than no release.
  # ---------------------------------------------------------------------------
  build:
    needs: [check, version]
    if: needs.check.outputs.should_release == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
            ext: dylib
            ldflags: '-extra-linker-flags:"-undefined dynamic_lookup"'
          - os: macos-15-intel
            target: darwin-x64
            ext: dylib
            ldflags: '-extra-linker-flags:"-undefined dynamic_lookup"'
          - os: ubuntu-latest
            target: linux-x64
            ext: so
            ldflags: ''
          - os: ubuntu-24.04-arm
            target: linux-arm64
            ext: so
            ldflags: ''
          - os: windows-latest
            target: win32-x64
            ext: dll
            ldflags: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build shared library
        shell: bash
        run: |
          mkdir -p bin
          cd bin
          odin build ../src \
            -build-mode:shared \
            -out:libkessel.${{ matrix.ext }} \
            -o:speed \
            -no-bounds-check \
            ${{ matrix.ldflags }}

      # Smoke test the freshly-built binary BEFORE upload-artifact so a
      # broken native binary fails the matrix here — before any
      # `npm publish` runs in publish-platforms. The same step in ci.yml
      # catches the same class of bug on PRs, but releases run from
      # `push: main` without re-running CI, so without this step a fix
      # that passes CI can still ship broken if (e.g.) a flag, an Odin
      # nightly, or a runner-image bump introduces a regression between
      # the CI run and the release run. Adds ~30s per platform.
      #
      # The v0.4.0 x86_64 SIGSEGV (latent SIMD alignment bug exposed by
      # the new multi-line smoke source) shipped to npm precisely
      # because this step was missing.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Smoke test (npm)
        shell: bash
        run: |
          cd npm/kessel
          npm install
          node test.js

      - uses: actions/upload-artifact@v4
        with:
          name: libkessel-${{ matrix.target }}
          path: bin/libkessel.${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # publish-platforms — for each target, download its artifact, stage it in
  # npm/platforms/<target>/, set the version, and `npm publish`.
  #
  # fail-fast: false — if one platform fails to publish, the others still
  # complete. The publish-main job below is gated on the overall matrix
  # result; if any platform failed, main is NOT published, so users keep
  # seeing the previous main version (which references the previous,
  # complete set of sub-packages). Stranded sub-package versions on the
  # registry are dead weight but harmless.
  # ---------------------------------------------------------------------------
  publish-platforms:
    needs: [check, version, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # npm provenance attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            ext: dylib
          - target: darwin-x64
            ext: dylib
          - target: linux-arm64
            ext: so
          - target: linux-x64
            ext: so
          - target: win32-x64
            ext: dll
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/download-artifact@v4
        with:
          name: libkessel-${{ matrix.target }}
          path: npm/platforms/${{ matrix.target }}/

      - name: Set sub-package version
        run: |
          cd npm/platforms/${{ matrix.target }}
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.version = "${{ needs.version.outputs.version }}";
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
          '
          ls -la
          cat package.json

      - name: Publish to npm
        run: |
          cd npm/platforms/${{ matrix.target }}
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # publish-main — only runs when EVERY platform sub-package succeeded.
  # Updates the main package's version + pins optionalDependencies to the
  # same version, commits + tags + pushes, then publishes.
  #
  # Order: commit/tag/push FIRST, npm publish SECOND. If the publish fails
  # after the tag is pushed, we can manually re-publish from the tag.
  # If the push fails before publish, nothing was released — we abort
  # cleanly with stranded sub-packages (recovered on next release).
  # ---------------------------------------------------------------------------
  publish-main:
    needs: [check, version, publish-platforms]
    if: |
      needs.check.outputs.should_release == 'true' &&
      needs.publish-platforms.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push commit + tag
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Update main package.json
        run: |
          cd npm/kessel
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const v = "${{ needs.version.outputs.version }}";
            pkg.version = v;
            for (const k of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[k] = v;
            }
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
          '
          cat package.json

      - name: Generate CHANGELOG entry
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          TODAY=$(date +%Y-%m-%d)
          LAST_TAG=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo "")
          [[ -z "$LAST_TAG" ]] && RANGE="HEAD" || RANGE="$LAST_TAG..HEAD"

          {
            echo "## [$VERSION] - $TODAY"
            echo ""
            ALL_COMMITS=$(git log --format="%s" $RANGE)
            FEATS=$(grep -E "^feat" <<< "$ALL_COMMITS" || true)
            FIXES=$(grep -E "^fix" <<< "$ALL_COMMITS" || true)
            PERFS=$(grep -E "^perf" <<< "$ALL_COMMITS" || true)
            [[ -n "$FEATS" ]] && { echo "### Added"; sed 's/^/- /' <<< "$FEATS"; echo ""; }
            [[ -n "$FIXES" ]] && { echo "### Fixed"; sed 's/^/- /' <<< "$FIXES"; echo ""; }
            [[ -n "$PERFS" ]] && { echo "### Performance"; sed 's/^/- /' <<< "$PERFS"; echo ""; }
          } > /tmp/new_entry.md

          # Prepend the new entry after the changelog header (first 5 lines
          # are convention: title + blurb + blank).
          if [[ -f CHANGELOG.md ]]; then
            HEADER=$(head -5 CHANGELOG.md)
            REST=$(tail -n +6 CHANGELOG.md)
            {
              echo "$HEADER"
              echo ""
              cat /tmp/new_entry.md
              echo "$REST"
            } > CHANGELOG.md
          else
            cp /tmp/new_entry.md CHANGELOG.md
          fi

          # Stage CHANGELOG inside npm/kessel so it ships with the package.
          cp CHANGELOG.md npm/kessel/CHANGELOG.md

      - name: Commit + tag + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add npm/kessel/package.json npm/kessel/CHANGELOG.md CHANGELOG.md
          git commit -m "release: v${{ needs.version.outputs.version }}"
          git tag -a "v${{ needs.version.outputs.version }}" -m "v${{ needs.version.outputs.version }}"
          git push
          git push --tags

      - name: Install dependencies
        run: cd npm/kessel && npm install --ignore-scripts

      - name: Publish to npm
        run: |
          cd npm/kessel
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
