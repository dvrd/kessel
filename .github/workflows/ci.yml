name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Canonical full-test job. POSIX-only because tests/runners/run_tests.sh
  # and the coverage harness assume bash + GNU tools. Runs on Apple Silicon
  # to exercise the NEON SIMD path.
  test:
    name: test (darwin-arm64, full)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: '3.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build
        run: task build

      - name: Build shared library
        run: task build:lib

      - name: Test (unit)
        run: tests/runners/run_tests.sh --update

      - name: Test npm package
        run: |
          cd npm/kessel
          npm install
          node test.js

  # Portability matrix. Proves each release target compiles cleanly and the
  # FFI binding works end-to-end. Does NOT publish anything.
  #
  # Phase 1 of the multi-target npm rollout: catch Windows / linux-arm64
  # build breakage *here* — not during a real release where a mid-matrix
  # failure would strand sub-packages on the registry at an unpublishable
  # version number.
  #
  # Target set is 5, not 6: `windows-arm64` is omitted because Odin does
  # not list it as a supported build target (Odin's Windows targets are
  # `windows_i386` and `windows_amd64` only). Revisit if upstream Odin
  # adds the target.
  #
  # `fail-fast: false` so a regression on one target doesn't mask the status
  # of the other four. Artifacts are uploaded so the eventual release
  # pipeline can consume the same contract.
  build-matrix:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
            ext: dylib
            ldflags: '-extra-linker-flags:"-undefined dynamic_lookup"'
          - os: macos-13
            target: darwin-x64
            ext: dylib
            ldflags: '-extra-linker-flags:"-undefined dynamic_lookup"'
          - os: ubuntu-latest
            target: linux-x64
            ext: so
            ldflags: ''
          - os: ubuntu-24.04-arm
            target: linux-arm64
            ext: so
            ldflags: ''
          - os: windows-latest
            target: win32-x64
            ext: dll
            ldflags: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Activate MSVC build environment on Windows so link.exe can find
      # Windows SDK libraries (kernel32.lib, msvcrt.lib, ...). Without
      # vcvars64.bat, the LIB env var is empty and Odin's linker
      # invocation fails with LNK1181 on a system library reference.
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Build shared library. We inline the `odin build` invocation instead
      # of calling `task build:lib` because the Taskfile hard-codes mac
      # linker flags. OS-conditional flags live here in the matrix.
      #
      # We `cd bin` first because on Windows Odin places per-package
      # intermediate .obj files in the output directory but invokes
      # link.exe with bare filenames; CWD must match the output dir or
      # MSVC fails with LNK1181 (`cannot open input file 'system.obj'`).
      # Running from `bin/` on every platform keeps the invocation
      # uniform and harmless on macOS/Linux.
      - name: Build shared library
        shell: bash
        run: |
          mkdir -p bin
          cd bin
          odin build ../src \
            -build-mode:shared \
            -out:libkessel.${{ matrix.ext }} \
            -o:speed \
            -no-bounds-check \
            -show-system-calls \
            ${{ matrix.ldflags }}

      # npm/kessel/index.js findLib() searches ../../bin/libkessel.<ext> first
      # (the repo-root build), so the build output above is picked up without
      # any staging step.
      - name: Smoke test (npm)
        shell: bash
        run: |
          cd npm/kessel
          npm install
          node test.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libkessel-${{ matrix.target }}
          path: bin/libkessel.${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 14
